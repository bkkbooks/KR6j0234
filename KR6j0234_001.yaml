body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳法大師臣施護奉詔譯如是我聞一時世尊在忉利天中波利質多羅樹下爾時帝釋天主及與一切天人軍衆前後圍繞來詣佛所各各至誠合掌歸依瞻仰如來次第而住爾時帝釋天主前白佛言世尊我有陀羅尼名千轉大明是陀羅尼於諸世間為大饒益所有一切天龍夜叉餓鬼鳩槃茶等乃至人非人等聞此陀羅尼者悉皆降伏於諸衆生所有一切不饒益事悉皆除殄惟願世尊大慈大悲許我宣說佛言天主善哉善哉如汝所說彼大千轉大明陀羅尼能於世間作大饒益汝欲說者當隨汝意爾時帝釋天主即說千轉大明陀羅尼曰怛儞也二合他引一曩呬怛寫婆帝引二婆誐嚩覩引三三野體難野過覩引四一切部多聞此所說驚怖迷悶狂惑退散寶賢夜叉主及輪成就等現衆色像使諸部多諸鬼神等及彼遊方空行起尸瘧病諸惡鬼等乃至一切行毒根本邪法惱害衆生不饒益事悉皆解脫阿曩引鉢帝引一烏播曩引鉢帝引二盎誐商迦哩引三擬哩二合恨拏二合哩引娑嚩二合引賀引四曩謨引沒馱引野曩謨引達哩摩二合引野曩謨引僧伽引野五曩謨引阿引哩野二合引嚩路枳帝引濕嚩二合囉引野六地引薩埵引野七摩賀引薩埵引野八摩賀引迦引嚕尼迦引野九曩謨引阿引哩野二合摩賀引薩瑳二合引摩波囉二合引鉢多二合引野十怛儞也二合他引十一目訖帝二合引尾目訖帝二合引十二鼻引那儞引尾鼻引那儞引十三儞哩摩二合隸引十四尾摩隸引十五穌目契引尾目契引十六瞢誐隸引穌瞢誐隸十七一切王怖解脫一切星曜變怪怖解脫一切自他軍衆鬪戰怖解脫一切兵仗怖解脫一切水火漂焚怖解脫一切惡病苦惱怖解脫一切毒惡傷害怖解脫師子怖象怖熊怖虎怖一切惡獸等怖大海漂溺怖深山閴寂怖乃至諸水灘難怖如是諸怖悉皆解脫曩謨娑引訖哩二合引一商迦致引商迦致引二迦嚕引致引迦嚕致引儞曳引娑嚩二合引賀引三入王宮時見大臣時行軍中時逢怨對時見毒蛇毒龍時遇夜叉毗舍遮羅剎烏鉢娑摩二合引囉所魅時乃至山海險難中時如是怖畏悉皆解脫曩謨引怛囉二合引𧹞婆嚩室羅二合引野𧹞一呬隸呬隸二唧隸唧隸三迦引播隸四摩引鄧霓娑嚩二合引賀引五又復王法所執或被枷鎖杻械牢固其身一切枉橫憂苦逼切悉皆解脫曩謨引多引哩引多引哩引一烏哆引哩引二覩哩引娑嚩二合引賀引三又復星曜所持或惡夢變怪致諸病苦夭枉至死乃至鬪諍論理互相恐逼如是諸怖悉皆解脫曩謨引左囉左囉一娑囉娑囉二尾娑囉尾娑囉三沒馱野二合沒馱野二合四引馱引野彌底娑嚩二合引賀五洛乞叉二合洛乞叉二合𤚥六薩哩嚩二合薩怛嚩二合引喃引左娑嚩二合引賀引七阿引哩野二合室哩二合滿哩馱二合覽八布瑟致二合俱嚕娑嚩二合引賀引摩麼引布哩嚩二合羅滿哩馱二合喃十扇引底孕二合俱囉娑嚩二合引賀引十一曩謨引賀帝引儞賀帝引十二薩哩嚩二合努瑟㡧二合引鉢囉二合底孕二合惹儞十三謨引賀儞謨引乞叉二合尼娑嚩二合引賀引十四曩謨引迦致引儞致迦吒致引娑嚩二合引賀引十五曩謨引阿引囉尼嚩引囉尼十六薩哩嚩二合儞哩嚩二合引囉尼娑嚩二合引賀引十七又復一切惡人行不善事持邪禁呪作諸禱當令衆生迷癡狂惑如是等事悉皆解脫嚕嚕計一哩嚕計二底瑟姹二合滿馱夜引弭三夜嚩誐嚩二合切四尾夢贊底五呬隸唧隸六迦引播引隸七迦瑟站二合引誐薩哩嚩二合哆八薩哩嚩二合婆曳毗藥二合娑嚩二合引賀引九世尊我此千轉大明譬如轉輪聖王有摩尼寶名曰如意凡諸所欲自然現前我此千轉大明亦復如是若有得者凡諸苦惱悉皆解脫世尊末世之時衆生薄福於三寶尊不知歸依恣身口心常造過惡是故世間諸惡鬼神伺得其便隱自形質假託變現於晝夜中惱害衆生使諸衆生得種種苦惱世尊若有衆生遇斯惡鬼種種惱亂苦惱之時乃至世間一切不可意時當於清淨之地取土七把每一把讀誦此大明加持七遍和作七丸繫於衣角當令一切行不饒益惡鬼神等不敢侵近恐怖退散當令是人晝夜安隱一切不祥悉皆殄滅爾時帝釋天主說此千轉大明陀羅尼已踊躍歡喜與諸天衆禮佛而退
